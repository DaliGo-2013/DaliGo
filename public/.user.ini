; Asegura que opcache revalide por timestamp en cada request, para que los
; despliegues apliquen los cambios de codigo PHP (p. ej. bootstrap/app.php)
; sin necesidad de reiniciar PHP ni resetear opcache manualmente.
opcache.validate_timestamps=1
opcache.revalidate_freq=0

; Subida de fotos de recepcion (2 por orden, hasta 8 MB c/u antes de comprimir).
; Se sube en multipart, por eso post_max_size cubre las 2 juntas + campos.
upload_max_filesize=12M
post_max_size=30M
