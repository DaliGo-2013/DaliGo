; Asegura que opcache revalide por timestamp en cada request, para que los
; despliegues apliquen los cambios de codigo PHP (p. ej. bootstrap/app.php)
; sin necesidad de reiniciar PHP ni resetear opcache manualmente.
opcache.validate_timestamps=1
opcache.revalidate_freq=0

; Subida de fotos de recepcion. Normalmente el navegador ya las achica antes de
; subir (JS), pero por si sube el original: limites holgados + memoria suficiente
; para que GD pueda decodificar una foto de celular (12MP ~100 MB) sin morir.
upload_max_filesize=12M
post_max_size=30M
memory_limit=256M
