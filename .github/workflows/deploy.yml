name: Desplegar a producción

# Se ejecuta en cada push a main (despliegue automatico) y tambien a mano
# desde la pestaña Actions (boton "Run workflow").
on:
  push:
    branches: [main]
  workflow_dispatch:

# Serializa los despliegues: nunca corren dos a la vez. Si llega un push
# mientras otro deploy esta en curso, espera (no lo cancela).
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Cliente OpenSSH nativo del runner (no appleboy/ssh-action).
      # -o IdentitiesOnly=yes es CLAVE: una actualizacion de la imagen del runner dejo
      # llaves en el ssh-agent que se ofrecen ANTES de la nuestra y agotan el MaxAuthTries
      # del server -> "Too many authentication failures" (exit 255) y el deploy muere en
      # segundos sin correr deploy.sh. Con IdentitiesOnly se ofrece SOLO la llave -i.
      # -o KexAlgorithms fuerza el unico KEX que ofrece HostGator (legacy), por compatibilidad.
      - name: Deploy por SSH a HostGator
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            -o KexAlgorithms=+diffie-hellman-group-exchange-sha256 \
            "$SSH_USER@$SSH_HOST" \
            "cd /home4/impdali/daligo && bash deploy.sh"
