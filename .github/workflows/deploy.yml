name: Desplegar a producción

# Se ejecuta en cada push a main (despliegue automatico) y tambien a mano
# desde la pestaña Actions (boton "Run workflow").
on:
  push:
    branches: [main]
  workflow_dispatch:

# Serializa los despliegues: nunca corren dos a la vez. Si llega un push
# mientras otro deploy esta en curso, espera (no lo cancela).
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Cliente OpenSSH nativo del runner.
      # IMPORTANTE: el secret SSH_PRIVATE_KEY debe ser la llave ed25519 autorizada en el
      # authorized_keys del server (daligo-deploy). Si es otra, el server la rechaza y ssh
      # cae a otros metodos -> "Too many authentication failures".
      # -o IdentitiesOnly + -o IdentityAgent=none: ofrecer SOLO esa llave (los runners nuevos
      #   traen llaves en el ssh-agent que, ofrecidas antes, agotan el MaxAuthTries del server).
      # -o KexAlgorithms: HostGator solo ofrece el KEX legacy diffie-hellman-group-exchange-sha256.
      #
      # db:seed --force AL FINAL (a nivel workflow, no en deploy.sh): el deploy.sh
      # del servidor quedo "congelado" en una version vieja (git reset --hard no lo
      # pisa -> probablemente tiene skip-worktree), por lo que su paso de seed solo
      # sembraba roles. El resto del codigo SI se actualiza (la migracion nueva corrio),
      # asi que correr el DatabaseSeeder completo aca, sobre el codigo ya actualizado,
      # garantiza que se siembren TODOS los seeders (sucursales, maquinas, material de
      # testeo del soplador, etc.). Es idempotente: seguro re-ejecutar en cada deploy.
      - name: Deploy por SSH a HostGator
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" \
            -o IdentitiesOnly=yes \
            -o IdentityAgent=none \
            -o StrictHostKeyChecking=accept-new \
            -o KexAlgorithms=+diffie-hellman-group-exchange-sha256 \
            "$SSH_USER@$SSH_HOST" \
            "cd /home4/impdali/daligo && git fetch origin main && (git ls-files -v | grep -E '^[a-z]' | cut -c3- | grep -v htaccess | xargs -r git update-index --no-assume-unchanged || true) && (git ls-files -v | grep -E '^[Ss]' | cut -c3- | grep -v htaccess | xargs -r git update-index --no-skip-worktree || true) && git reset --hard FETCH_HEAD && /opt/cpanel/ea-php83/root/usr/bin/php /opt/cpanel/composer/bin/composer dump-autoload -o --no-interaction --no-scripts && /opt/cpanel/ea-php83/root/usr/bin/php artisan migrate --force && /opt/cpanel/ea-php83/root/usr/bin/php artisan db:seed --force && /opt/cpanel/ea-php83/root/usr/bin/php artisan storage:link --force && /opt/cpanel/ea-php83/root/usr/bin/php artisan optimize:clear && /opt/cpanel/ea-php83/root/usr/bin/php artisan config:cache && /opt/cpanel/ea-php83/root/usr/bin/php artisan route:cache && /opt/cpanel/ea-php83/root/usr/bin/php artisan permission:cache-reset"
