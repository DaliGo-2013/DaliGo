name: Desplegar a producción

# Se ejecuta en cada push a main (despliegue automatico) y tambien a mano
# desde la pestaña Actions (boton "Run workflow").
on:
  push:
    branches: [main]
  workflow_dispatch:

# Serializa los despliegues: nunca corren dos a la vez. Si llega un push
# mientras otro deploy esta en curso, espera (no lo cancela).
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Usamos el cliente OpenSSH nativo del runner (no appleboy/ssh-action):
      # el SSH de HostGator solo ofrece el KEX diffie-hellman-group-exchange-sha256,
      # que la libreria SSH en Go de esa action no negocia. OpenSSH si lo soporta.
      - name: Deploy por SSH a HostGator
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" \
            -o StrictHostKeyChecking=accept-new \
            "$SSH_USER@$SSH_HOST" \
            "cd /home4/impdali/daligo && bash deploy.sh"
