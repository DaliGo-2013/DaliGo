name: Tests

# Corre la suite (PHPUnit, SQLite en memoria) en cada push a main, en PRs y a
# mano. Da la senal automatica que faltaba: confirma que los tests pasan de
# verdad (el entorno local de algunos colaboradores no tiene PHP).
#
# Sin actions de terceros (el runner ubuntu-latest ya trae PHP 8.3 + Composer):
# la org restringe Actions a las creadas por GitHub, asi que setup-php de
# terceros rompia el arranque del workflow. Solo se usa actions/checkout.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  phpunit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Versiones (PHP y Composer vienen preinstalados en el runner)
        run: |
          php -v
          php -m | grep -iE 'pdo_sqlite|sqlite3' || true
          composer --version

      - name: Instalar dependencias (con dev: incluye PHPUnit)
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Preparar .env + APP_KEY
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Correr la suite
        run: php artisan test
