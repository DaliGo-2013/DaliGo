name: Tests

# Corre la suite (PHPUnit, SQLite en memoria) en cada push a main, en PRs y a
# mano. Da la senal automatica que faltaba: confirma que los tests pasan de
# verdad (el entorno local de algunos colaboradores no tiene PHP).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  phpunit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: sqlite3, pdo_sqlite, mbstring, dom, xml, bcmath, ctype, tokenizer, fileinfo
          coverage: none

      - name: Cache de Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Instalar dependencias (con dev: incluye PHPUnit)
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Preparar .env + APP_KEY
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Correr la suite
        run: php artisan test
